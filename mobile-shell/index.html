<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>dalow</title>
    <style>
      :root {
        color-scheme: light;
        --bg-1: #f7f8fb;
        --bg-2: #eef1f6;
        --surface: rgba(255, 255, 255, 0.82);
        --border: rgba(11, 20, 38, 0.09);
        --ink: #101828;
        --muted: #667085;
        --navy: #16233b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding:
          max(24px, env(safe-area-inset-top))
          24px
          max(24px, env(safe-area-inset-bottom))
          24px;
        background:
          radial-gradient(circle at top left, rgba(22, 35, 59, 0.10), transparent 32%),
          radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.08), transparent 28%),
          linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
        color: var(--ink);
        font-family:
          "SF Pro Display",
          "SF Pro Text",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid var(--border);
        border-radius: 30px;
        background: var(--surface);
        backdrop-filter: blur(20px);
        box-shadow: 0 28px 70px rgba(15, 23, 42, 0.10);
        padding: 30px 24px 26px;
      }

      .loader {
        display: grid;
        justify-items: center;
        gap: 14px;
        margin-bottom: 18px;
      }

      .checkers-board {
        position: relative;
        width: 132px;
        height: 132px;
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid rgba(16, 24, 40, 0.12);
        box-shadow: 0 16px 36px rgba(15, 23, 42, 0.18);
      }

      .checkers-grid {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: repeat(8, minmax(0, 1fr));
      }

      .cell-light {
        background: rgba(249, 250, 251, 0.96);
      }

      .cell-dark {
        background: rgba(22, 35, 59, 0.92);
      }

      .piece {
        position: absolute;
        width: 11%;
        height: 11%;
        border-radius: 999px;
        top: 6%;
        left: 6%;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.24);
      }

      .piece-light {
        background: #f8f8f8;
        border: 1px solid rgba(16, 16, 16, 0.3);
        animation: checkers-path-a 2.2s ease-in-out infinite;
      }

      .piece-dark {
        background: var(--navy);
        border: 1px solid rgba(255, 255, 255, 0.22);
        animation: checkers-path-b 2.5s ease-in-out infinite;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.02;
        letter-spacing: -0.04em;
      }

      p {
        margin: 12px 0 0;
        font-size: 14px;
        line-height: 1.5;
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border-radius: 999px;
        border: 1px solid var(--border);
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
      }

      .button-primary {
        background: var(--navy);
        border-color: transparent;
        color: #fff;
      }

      .button-secondary {
        background: rgba(255, 255, 255, 0.88);
        color: var(--ink);
      }

      @keyframes checkers-path-a {
        0%,
        100% {
          transform: translate(0%, 0%);
        }
        25% {
          transform: translate(182%, 182%);
        }
        50% {
          transform: translate(364%, 0%);
        }
        75% {
          transform: translate(546%, 182%);
        }
      }

      @keyframes checkers-path-b {
        0%,
        100% {
          transform: translate(546%, 546%);
        }
        25% {
          transform: translate(364%, 364%);
        }
        50% {
          transform: translate(182%, 546%);
        }
        75% {
          transform: translate(0%, 364%);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="loader">
        <div class="checkers-board" aria-hidden="true">
          <div class="checkers-grid">
            <span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span>
            <span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span>
            <span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span>
            <span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span>
            <span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span>
            <span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span>
            <span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span>
            <span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span>
          </div>
          <span class="piece piece-light"></span>
          <span class="piece piece-dark"></span>
        </div>
      </div>
      <p class="eyebrow">For collectors, by collectors</p>
      <h1>dalow is loading</h1>
      <p>
        The iPhone app now runs the full dalow product. If this screen stays
        up, check your connection and reopen the app.
      </p>
      <div class="actions">
        <a class="button button-primary" href="https://plug-chi.vercel.app">Open dalow</a>
        <a class="button button-secondary" href="javascript:location.reload()">Retry</a>
      </div>
    </main>
  </body>
</html>
