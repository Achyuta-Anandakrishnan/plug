<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>dalow</title>
    <style>
      :root {
        color-scheme: light;
        --bg-1: #f5f5f5;
        --bg-2: #ebebeb;
        --ink: #101010;
        --muted: #5a5a5a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding:
          max(24px, env(safe-area-inset-top))
          24px
          max(24px, env(safe-area-inset-bottom))
          24px;
        background:
          radial-gradient(circle at top left, rgba(0, 0, 0, 0.09), transparent 34%),
          linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
        color: var(--ink);
        font-family:
          "SF Pro Display",
          "SF Pro Text",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid rgba(11, 20, 38, 0.08);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(20px);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        padding: 28px 24px;
      }

      .loader {
        display: grid;
        justify-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .checkers-board {
        position: relative;
        width: 132px;
        height: 132px;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(16, 16, 16, 0.18);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
      }

      .checkers-grid {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: repeat(8, minmax(0, 1fr));
      }

      .cell-light {
        background: rgba(250, 250, 250, 0.92);
      }

      .cell-dark {
        background: rgba(26, 26, 26, 0.86);
      }

      .piece {
        position: absolute;
        width: 11%;
        height: 11%;
        border-radius: 999px;
        top: 6%;
        left: 6%;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.24);
      }

      .piece-light {
        background: #f8f8f8;
        border: 1px solid rgba(16, 16, 16, 0.3);
        animation: checkers-path-a 2.2s ease-in-out infinite;
      }

      .piece-dark {
        background: #111;
        border: 1px solid rgba(255, 255, 255, 0.22);
        animation: checkers-path-b 2.5s ease-in-out infinite;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.05;
      }

      p {
        margin: 12px 0 0;
        font-size: 14px;
        line-height: 1.5;
        color: var(--muted);
      }

      @keyframes checkers-path-a {
        0%,
        100% {
          transform: translate(0%, 0%);
        }
        25% {
          transform: translate(182%, 182%);
        }
        50% {
          transform: translate(364%, 0%);
        }
        75% {
          transform: translate(546%, 182%);
        }
      }

      @keyframes checkers-path-b {
        0%,
        100% {
          transform: translate(546%, 546%);
        }
        25% {
          transform: translate(364%, 364%);
        }
        50% {
          transform: translate(182%, 546%);
        }
        75% {
          transform: translate(0%, 364%);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="loader">
        <div class="checkers-board" aria-hidden="true">
          <div class="checkers-grid">
            <span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span>
            <span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span>
            <span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span>
            <span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span>
            <span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span>
            <span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span>
            <span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span>
            <span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span><span class="cell-dark"></span><span class="cell-light"></span>
          </div>
          <span class="piece piece-light"></span>
          <span class="piece piece-dark"></span>
        </div>
      </div>
      <h1>dalow is loading</h1>
      <p>
        This iPhone app expects the dalow web server to be reachable from the
        device.
      </p>
    </main>
  </body>
</html>
