<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Vyre</title>
    <style>
      :root {
        color-scheme: light;
        --bg-1: #f9fbff;
        --bg-2: #eef3fb;
        --ink: #0b1426;
        --muted: #5d6983;
        --royal: #1b4dff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding:
          max(24px, env(safe-area-inset-top))
          24px
          max(24px, env(safe-area-inset-bottom))
          24px;
        background:
          radial-gradient(circle at top left, rgba(27, 77, 255, 0.14), transparent 34%),
          linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
        color: var(--ink);
        font-family:
          "SF Pro Display",
          "SF Pro Text",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid rgba(11, 20, 38, 0.08);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(20px);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        padding: 28px 24px;
      }

      .mark {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        margin-bottom: 16px;
        background: rgba(27, 77, 255, 0.08);
      }

      svg {
        width: 32px;
        height: 32px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.05;
      }

      p {
        margin: 12px 0 0;
        font-size: 14px;
        line-height: 1.5;
        color: var(--muted);
      }

      code {
        display: inline-block;
        margin-top: 10px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(27, 77, 255, 0.08);
        color: var(--royal);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">
        <svg viewBox="0 0 64 64" aria-hidden="true" fill="none">
          <path
            d="M15 14h11l6 10 6-10h11L38 50h-12L15 14Z"
            fill="#1B4DFF"
          />
        </svg>
      </div>
      <h1>Vyre is loading</h1>
      <p>
        This iPhone app expects the Vyre web server to be reachable from the
        device. If you are testing locally, set
        <code>CAPACITOR_SERVER_URL</code> to your Mac's LAN URL and sync again.
      </p>
    </main>
  </body>
</html>
